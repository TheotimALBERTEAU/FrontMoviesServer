<div class="search-overlay" [class.active]="isSearchOpen" (click)="closeSearch()">
  <div class="central-search-container" *ngIf="isSearchOpen" (click)="$event.stopPropagation()">
    <div class="central-search-bar">
      <img src="Assets/Movies/search-icon.svg" class="search-icon">
      <input type="text"
             #centralInput
             placeholder="Rechercher des films, séries, animés .."
             [(ngModel)]="searchQuery"
             (input)="onSearchChange($event)">
    </div>
    <div class="search-loader" *ngIf="isLoading"></div>

    <div class="search-results-container" *ngIf="allResults.length > 0 || actorsResults.length > 0">
      <div class="result-container" *ngIf="allResults.length > 0">
        <p class="results-label">Résultats</p>
        <div class="result-item" *ngFor="let media of allResults" (click)="moviesService.goMedia(media); closeSearch()">
          <img [src]="media.cover" class="result-poster">
          <div class="result-info">
            <p class="result-title">{{ media.title }}</p>
            <p class="result-desc">{{ media.synopsis | slice:0:80 }}...</p>
          </div>
        </div>
      </div>

      <div class="result-container" *ngIf="actorsResults.length > 0">
        <p class="results-label">Acteurs</p>
        <div class="result-item" *ngFor="let actor of actorsResults" (click)="actorsService.goActor(actor.slug); closeSearch()">
          <img [src]="actor.profile_picture" class="result-poster">
          <div class="result-info">
            <p class="result-title">{{ actor.name }}</p>
            <p class="result-desc">{{ actor.biography | slice:0:80 }}...</p>
          </div>
        </div>
      </div>

      <div class="see-all" (click)="onClickGoSearchPage(searchQuery)">Voir tous les résultats</div>
    </div>
  </div>
</div>

<header [class.search-active]="isSearchOpen">
  <div class="header_container">
    <div class="left-section">
      <button class="menu-btn" (click)="sidebarService.toggle()">
        <img src="Assets/Sidebar/menu-icon.svg" alt="Menu">
      </button>

      <div class="logo-section" (click)="OnClickGoHome()">
        <img src="Assets/Logos/Logo-title-without-bg.png" alt="Hessflix Logo">
      </div>
    </div>

    <div class="search-trigger" (click)="openSearch()">
      <div class="search-bar-placeholder">
        <img src="Assets/Movies/search-icon.svg" class="search-icon">
        <span>Rechercher des films, séries, animés ..</span>
        <span class="search-shortcut">Ctrl + Q</span>
      </div>
    </div>

    <div class="nav-actions">
      <ng-container *ngIf="!authService.isLoggedIn()">
        <a class="login-link" (click)="OnClickGoLogin()">Se connecter</a>
        <button class="signup-button" (click)="OnClickGoSignup()">
          <span>S'inscrire</span>
          <svg class="icon-svg" viewBox="0 0 30 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l8-8-8-8" />
          </svg>
        </button>
      </ng-container>

      <div class="profile-wrapper" *ngIf="authService.isLoggedIn()">
        <div class="profile-container" (click)="toggleProfileMenu()">
          <img src="Assets/Users/HeadBar/profile-icon.svg" class="profile-icon">
        </div>
        <div class="dropdown-menu" *ngIf="isProfileMenuOpen">
          <div class="dropdown-item" (click)="onLogout()">Se déconnecter</div>
          <div class="dropdown-item" (click)="onClickGoProfilePage()">Profil</div>
        </div>
      </div>
    </div>
  </div>
</header>

<app-sidebar></app-sidebar>

<div class="content" [class.sidebar-collapsed]="sidebarService.isCollapsed()">
  <router-outlet />
</div>
