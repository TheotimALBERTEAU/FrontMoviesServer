<section id="movies-grid">
  <h3 class="title">
    Résultats de la recherche pour : {{ query }}
  </h3>

  <div class="movies-grid">
    @for (movie of resultsMoviesList; track movie._id) {
      <div class="movie-card">
        <div class="movie-card-background"
             [style.background-image]="'url(' + movie.cover + ')'"
             (click)="onClickGoMovie(movie.slug)">

          <div class="card-overlay"></div>

          <div class="play-button">
            <img src="Assets/Movies/play-button.png" alt="play-button">
          </div>
        </div>

        <div class="card-content">
          <div class="movie-details-bar">
            <div class="duration">{{ movie.duration }} min {{ movie.year }}</div>
          </div>

          <h3 class="movie-title">{{ movie.title }}</h3>

          <div class="movie-details-bar">
            <div class="main-genre">{{ movie.genre[0] }}</div>
            <div class="info-block type-indicator">{{ movie.type }}</div>
          </div>
        </div>
      </div>
    }
  </div>

  <div class="no-results" *ngIf="resultsMoviesList.length === 0">
    <p>Aucun film ne correspond à votre recherche.</p>
  </div>
</section>
