<div class="login-container">
  <h2 class="login-title">Connexion</h2>

  <div class="login-form">
    <div class="form-group">
      <label class="form-label" for="form-email">E-mail</label>
      <div class="input-wrapper">
        <input class="form-input" id="form-email" [(ngModel)]="email" type="text" placeholder="Entrez votre e-mail">
      </div>
    </div>

    <div class="form-group">
      <div class="label-row">
        <label class="form-label" for="form-password">Mot de passe</label>
        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
      </div>
      <div class="input-wrapper">
        <input class="form-input" id="form-password" [(ngModel)]="password" [type]="loginService.passwordInputType" placeholder="Entrez votre mot de passe">
        <img
          class="toggle-icon"
          (click)="loginService.togglePasswordVisibility('password')"
          [src]="loginService.passwordInputType === 'password' ? '/Assets/Users/Connection/unshowed-password.svg' : '/Assets/Users/Connection/showed-password.svg'"
          alt="Toggle Visibility">
      </div>
    </div>
  </div>

  <div class="action-container">
    <button class="btn-primary" (click)="onClickLogin()">
      <img src="Assets/Users/Connection/connect-arrow.svg" alt="Connexion" class="btn-icon">
      Se connecter
    </button>
  </div>

  <p class="signup-text">
    Vous n'avez pas encore de compte ? <a (click)="onClickGoSignup()" class="signup-link">Créer un compte</a>
  </p>
</div>
